# Alertmanager routing config for SMFC ERP (STAGE-6-PENDING-alerting-rules).
#
# Route strategy:
#   severity=critical → PagerDuty (on-call) + Slack (#smfc-oncall)
#   severity=warning  → Slack only (#smfc-oncall)
#   team=compliance   → compliance escalation channel regardless of severity
#
# Secrets are supplied via environment variables (Alertmanager supports
# $VAR interpolation in v0.26+); never commit tokens.
#
# Paired with ops/alertmanager/rules.yml.

global:
  resolve_timeout: 5m
  smtp_from: "alerts@smfc.internal"

route:
  receiver: slack-oncall
  group_by: [alertname, severity, team]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-oncall
      continue: true
    - matchers:
        - team="compliance"
      receiver: slack-compliance
      continue: true

receivers:
  - name: slack-oncall
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_ONCALL}
        channel: "#smfc-oncall"
        send_resolved: true
        title: "{{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})"
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}

  - name: slack-compliance
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_COMPLIANCE}
        channel: "#smfc-compliance"
        send_resolved: true
        title: "[COMPLIANCE] {{ .CommonLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook_url }}
          {{ end }}

  - name: pagerduty-oncall
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY}
        send_resolved: true
        description: "{{ .CommonLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}"
        details:
          runbook: "{{ (index .Alerts 0).Annotations.runbook_url }}"
          firing: "{{ .Alerts.Firing | len }}"

inhibit_rules:
  # If the worker pool is down, the queue-backlog alert is noise —
  # suppress it while the down alert is firing.
  - source_matchers: [alertname="ArqWorkerDown", severity="critical"]
    target_matchers: [alertname="ArqQueueBacklog"]
    equal: [env]
