        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smfc -d smfc_erp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://smfc:smfc_secret@127.0.0.1:5432/smfc_erp
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET_KEY: ci-accounting-secret
      APP_ENV: development
      DEBUG: 'false'
      PLAYWRIGHT_API_BASE: http://127.0.0.1:8001/api/v1
      PLAYWRIGHT_LIVE_BACKEND: '1'
      PLAYWRIGHT_USE_BUILD: '1'
      UAT_ADMIN_USERNAME: krishna
      UAT_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
