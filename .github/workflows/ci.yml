name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  PNPM_VERSION: '9.15.0'

jobs:
  stub-lint:
    name: Stub lint (CLAUDE.md §12.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/check-stubs.mjs

  frontend-lint:
    name: Frontend lint + typecheck + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  frontend-unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-results
          path: coverage/

  frontend-integration:
    name: Frontend integration (Vitest + MSW)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  backend-lint:
    name: Backend lint + type
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: black --check .
      - run: mypy app
      # Every mutable table must have `version` (optimistic locking) OR be
      # listed in EXEMPT_TABLES with a documented reason. See CLAUDE.md §6.3.
      - name: Optimistic-locking audit
        run: PYTHONPATH=. python scripts/audit_optimistic_locking.py

  backend-unit:
    name: Backend unit tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q -m "not integration"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-results
          path: backend/.pytest_cache/

  backend-integration:
    name: Backend integration (pytest + testcontainers Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q -m integration

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # E2E depends on a successful build; mock backends inside the tests.
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: PLAYWRIGHT_USE_BUILD=1 pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  e2e-taxation:
    name: E2E taxation (Playwright + live backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: smfc
          POSTGRES_PASSWORD: smfc_secret
          POSTGRES_DB: smfc_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smfc -d smfc_erp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://smfc:smfc_secret@127.0.0.1:5432/smfc_erp
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET_KEY: ci-taxation-secret
      APP_ENV: development
      DEBUG: 'false'
      PLAYWRIGHT_API_BASE: http://127.0.0.1:8001/api/v1
      PLAYWRIGHT_LIVE_BACKEND: '1'
      PLAYWRIGHT_USE_BUILD: '1'
      UAT_ADMIN_USERNAME: krishna
      UAT_ADMIN_PASSWORD: ChangeMe123!
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - run: pnpm install --frozen-lockfile
      - run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: cd backend && alembic upgrade head
      - run: cd backend && python scripts/seed_data.py
      - run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8001 > /tmp/tax-backend.log 2>&1 &
          echo $! > /tmp/tax-backend.pid
      - run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8001/health > /tmp/tax-backend-health.json; then
              cat /tmp/tax-backend-health.json
              exit 0
            fi
            sleep 2
          done
          cat /tmp/tax-backend.log
          exit 1
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e:tax
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-taxation
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taxation-backend-log
          path: /tmp/tax-backend.log
          retention-days: 14

