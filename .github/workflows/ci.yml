      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accounting-backend-log
          path: /tmp/accounting-backend.log
          retention-days: 14

  e2e-lending:
    name: E2E lending (Playwright + live backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: smfc
          POSTGRES_PASSWORD: smfc_secret
